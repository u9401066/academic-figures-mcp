<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Academic Figures MCP banner</title>
  <desc id="desc">Workflow-first academic figure planning and generation banner for VS Code and Open VSX listings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#162A46"/>
      <stop offset="55%" stop-color="#214D6B"/>
      <stop offset="100%" stop-color="#F2E9D8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9EE" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#F6E7CA" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="cardSurface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF4F8" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#D7E3EE" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="metaSurface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9E5EF" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#C8D7E4" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FA7A2"/>
      <stop offset="100%" stop-color="#E39A46"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0D1E31" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1060" cy="84" r="220" fill="#6AC4BC" opacity="0.12"/>
  <circle cx="120" cy="560" r="180" fill="#F1B36A" opacity="0.14"/>
  <path d="M820 72c92 26 178 88 254 176 38 44 74 95 108 154v166H676c18-102 59-194 124-278 14-19 30-38 48-58z" fill="#FFFFFF" opacity="0.08"/>

  <rect x="72" y="72" width="1136" height="496" rx="36" fill="#0F2238" opacity="0.18"/>
  <g filter="url(#shadow)">
    <rect x="88" y="88" width="1104" height="464" rx="32" fill="url(#panel)"/>
  </g>

  <rect x="120" y="124" width="192" height="34" rx="17" fill="#163252"/>
  <text x="216" y="147" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#F5E9CF">WORKFLOW-FIRST MCP</text>

  <text x="120" y="228" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="800" fill="#FFF8EC">Academic Figures</text>
  <text x="120" y="296" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#FFF8EC">MCP</text>
  <text x="120" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#9FE7DD">Plan. Generate. Verify. Iterate.</text>

  <text x="120" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#C6D9E7">Workflow-first figure planning for VS Code, Copilot, and Open VSX.</text>
  <text x="120" y="444" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#C6D9E7">From PMID briefs to quality-gated outputs in one guided extension.</text>

  <rect x="120" y="486" width="360" height="60" rx="18" fill="#163252"/>
  <text x="300" y="524" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFF7EA">VS Code Marketplace + Open VSX</text>

  <g transform="translate(752 146)">
    <rect x="0" y="0" width="344" height="252" rx="28" fill="url(#cardSurface)" stroke="#F7FBFF" stroke-opacity="0.22"/>
    <rect x="28" y="30" width="140" height="20" rx="10" fill="#17304D" opacity="0.12"/>
    <rect x="28" y="68" width="288" height="52" rx="18" fill="url(#accent)"/>
    <text x="50" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#11263D">Single-entry Workflow</text>
    <rect x="28" y="142" width="124" height="34" rx="17" fill="#DCEFE9"/>
    <text x="90" y="165" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#1A5C5B">Plan First</text>
    <rect x="184" y="142" width="124" height="34" rx="17" fill="#F7E2C1"/>
    <text x="246" y="165" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#8C5520">Verify</text>
    <path d="M56 210h208" stroke="#17304D" stroke-width="10" stroke-linecap="round" opacity="0.18"/>
    <circle cx="80" cy="210" r="18" fill="#163252"/>
    <circle cx="160" cy="210" r="18" fill="#4FA7A2"/>
    <circle cx="240" cy="210" r="18" fill="#E39A46"/>
    <text x="80" y="243" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#17304D">Plan</text>
    <text x="160" y="243" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#17304D">Generate</text>
    <text x="240" y="243" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#17304D">Verify</text>
  </g>

  <g transform="translate(752 432)">
    <rect x="0" y="0" width="344" height="64" rx="22" fill="url(#metaSurface)" stroke="#F7FBFF" stroke-opacity="0.14"/>
    <text x="28" y="27" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#15314E">PMID planning</text>
    <text x="146" y="27" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#15314E">Generic briefs</text>
    <text x="266" y="27" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#15314E">Review loop</text>
    <text x="28" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#4B647A">PNG GIF JPEG WEBP SVG</text>
  </g>
</svg>