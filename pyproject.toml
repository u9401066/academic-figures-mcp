[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "academic-figures-mcp"
version = "0.1.0"
description = "Medical academic figure generator MCP server"
requires-python = ">=3.10"
dependencies = [
    "mcp[cli]>=1.0.0",
    "httpx>=0.27",
    "google-genai>=1.0.0",
    "pillow>=10.0",
]

[project.scripts]
afm-server = "src.server:main"
